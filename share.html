<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shared File</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/style.css">
    <!-- Preview libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { background: linear-gradient(180deg,#f5fbff,#f6f9fc); }
        .share-card { max-width: 860px; margin: 48px auto; padding: 32px; background: #fff; border-radius: 16px; box-shadow: 0 6px 32px rgba(15,23,36,0.10); border: 1px solid rgba(15,23,36,0.07); }
        .share-header { display: flex; align-items: center; gap: 14px; margin-bottom: 20px; }
        .share-icon { font-size: 40px; color: var(--accent-1); }
        .share-meta { flex: 1; }
        .share-meta h2 { margin: 0 0 4px; font-size: 20px; word-break: break-all; }
        .share-meta p { margin: 0; color: var(--muted); font-size: 13px; }
        .badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-right: 6px; }
        .badge-view { background: #dbeafe; color: #1d4ed8; }
        .badge-edit { background: #dcfce7; color: #15803d; }
        .badge-pw { background: #fef3c7; color: #92400e; }
        /* Password form */
        #pwForm { max-width: 360px; margin: 24px auto; text-align: center; }
        #pwForm input { width: 100%; padding: 10px 14px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--border); font-size: 15px; }
        #pwForm button { width: 100%; }
        /* Preview area */
        #previewArea { margin-top: 20px; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #fafafa; }
        #previewInner { padding: 20px; min-height: 120px; }
        #previewInner img { max-width: 100%; display: block; margin: 0 auto; border-radius: 8px; }
        #previewInner pre { white-space: pre-wrap; word-break: break-word; font-size: 13px; font-family: 'Fira Mono', monospace; margin: 0; }
        #previewInner iframe { width: 100%; height: 65vh; border: none; display: block; }
        #previewInner table { font-size: 13px; }
        .pptx-slide { border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin-bottom: 12px; background: #fff; }
        .pptx-slide h4 { margin: 0 0 8px; font-size: 13px; color: var(--muted); }
        .spinner { text-align: center; padding: 40px; color: var(--muted); }
        .download-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #f0f9ff; border-top: 1px solid #bae6fd; }
        .download-bar span { font-size: 13px; color: #0369a1; }
        #errorBox { text-align: center; padding: 48px 24px; }
        #errorBox .err-icon { font-size: 48px; color: #ef4444; margin-bottom: 12px; }
    </style>
    <script src="/branding.js"></script>
</head>
<body>
<div class="share-card">
    <div id="loading" class="spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Loading…</p></div>
    <div id="errorBox" style="display:none;">
        <div class="err-icon"><i class="fas fa-exclamation-circle"></i></div>
        <h2 id="errTitle">Something went wrong</h2>
        <p id="errMsg"></p>
    </div>

    <div id="shareView" style="display:none;">
        <div class="share-header">
            <div class="share-icon"><i id="fileIconEl" class="fas fa-file"></i></div>
            <div class="share-meta">
                <h2 id="sharedFilename"></h2>
                <p>
                    <span id="modeBadge" class="badge"></span>
                    <span id="pwBadge" class="badge badge-pw" style="display:none;"><i class="fas fa-lock"></i> Password protected</span>
                    <span id="expiresBadge" style="color:var(--muted);font-size:12px;"></span>
                </p>
            </div>
        </div>

        <!-- Password unlock form -->
        <div id="pwSection" style="display:none;">
            <hr>
            <div id="pwForm">
                <h3><i class="fas fa-lock"></i> Enter Password</h3>
                <input id="pwInput" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')unlock()">
                <button onclick="unlock()"><i class="fas fa-unlock-alt"></i> Unlock</button>
                <p id="pwError" style="color:#ef4444;font-size:13px;display:none;">Wrong password. Try again.</p>
            </div>
        </div>

        <!-- File preview -->
        <div id="previewSection" style="display:none;">
            <div id="previewArea">
                <div id="previewInner" class="spinner"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Loading preview…</p></div>
            </div>
            <!-- Download button (only shown for edit/download mode) -->
            <div id="downloadBar" class="download-bar" style="display:none;">
                <span><i class="fas fa-info-circle"></i> Download is allowed for this share.</span>
                <a id="downloadLink" href="#" download><button class="btn-sm" style="padding:8px 14px;"><i class="fas fa-download"></i> Download</button></a>
            </div>
        </div>
    </div>
</div>

<div id="toast-container" class="toast-container" aria-live="polite" aria-atomic="true"></div>

<script>
    const token = location.pathname.split('/share/')[1];
    let shareInfo = null;

    function showToast(msg, type='info') {
        const c = document.getElementById('toast-container');
        const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
        c.appendChild(t); requestAnimationFrame(() => t.classList.add('show'));
        setTimeout(() => { t.classList.remove('show'); setTimeout(() => c.removeChild(t), 220); }, 3000);
    }

    function showError(title, msg) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('shareView').style.display = 'none';
        document.getElementById('errorBox').style.display = 'block';
        document.getElementById('errTitle').textContent = title;
        document.getElementById('errMsg').textContent = msg;
    }

    function escapeHtml(str) {
        return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function fileIcon(filename) {
        const ext = (filename.split('.').pop() || '').toLowerCase();
        const map = { pdf:'fa-file-pdf', doc:'fa-file-word', docx:'fa-file-word', xls:'fa-file-excel', xlsx:'fa-file-excel', ppt:'fa-file-powerpoint', pptx:'fa-file-powerpoint', jpg:'fa-file-image', jpeg:'fa-file-image', png:'fa-file-image', gif:'fa-file-image', webp:'fa-file-image', svg:'fa-file-image', mp4:'fa-file-video', mov:'fa-file-video', mp3:'fa-file-audio', txt:'fa-file-alt', md:'fa-file-alt', csv:'fa-file-csv', zip:'fa-file-archive' };
        return 'fas ' + (map[ext] || 'fa-file');
    }

    async function loadShareInfo() {
        try {
            const resp = await fetch(`/api/share/${token}`);
            if (resp.status === 404) { showError('Share not found', 'This link does not exist or has been deleted.'); return; }
            if (resp.status === 410) { showError('Share expired', 'This share link has expired.'); return; }
            if (!resp.ok) { showError('Error', 'Failed to load share info.'); return; }
            shareInfo = await resp.json();
            renderShareInfo();
        } catch (e) {
            showError('Error', 'Could not connect to server.');
        }
    }

    function renderShareInfo() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('shareView').style.display = 'block';

        document.getElementById('sharedFilename').textContent = shareInfo.filename;
        document.getElementById('fileIconEl').className = fileIcon(shareInfo.filename);

        const modeBadge = document.getElementById('modeBadge');
        if (shareInfo.mode === 'edit') {
            modeBadge.textContent = 'View + Download';
            modeBadge.className = 'badge badge-edit';
        } else {
            modeBadge.textContent = 'View only';
            modeBadge.className = 'badge badge-view';
        }

        if (shareInfo.hasPassword) {
            document.getElementById('pwBadge').style.display = 'inline-flex';
        }

        if (shareInfo.expires_at) {
            document.getElementById('expiresBadge').textContent = 'Expires: ' + new Date(shareInfo.expires_at).toLocaleString();
        }

        if (shareInfo.hasPassword) {
            document.getElementById('pwSection').style.display = 'block';
        } else {
            showPreview();
        }
    }

    async function unlock() {
        const pwd = document.getElementById('pwInput').value;
        document.getElementById('pwError').style.display = 'none';
        try {
            const resp = await fetch(`/api/share/${token}/unlock`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd })
            });
            if (resp.status === 403) { document.getElementById('pwError').style.display = 'block'; return; }
            if (!resp.ok) { showToast('Unlock failed', 'error'); return; }
            document.getElementById('pwSection').style.display = 'none';
            showPreview();
        } catch (e) {
            showToast('Error unlocking share', 'error');
        }
    }

    async function showPreview() {
        document.getElementById('previewSection').style.display = 'block';
        const filename = shareInfo.filename;
        const ext = (filename.split('.').pop() || '').toLowerCase();
        const fileUrl = `/api/share/${token}/file`;
        const inner = document.getElementById('previewInner');

        if (shareInfo.mode === 'edit') {
            const dlBar = document.getElementById('downloadBar');
            dlBar.style.display = 'flex';
            document.getElementById('downloadLink').href = fileUrl;
            document.getElementById('downloadLink').setAttribute('download', filename);
        }

        try {
            if (['jpg','jpeg','png','gif','webp','svg','bmp'].includes(ext)) {
                // Fetch as blob to use session cookie
                const blob = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error(r.status); return r.blob(); });
                const objUrl = URL.createObjectURL(blob);
                inner.innerHTML = `<img src="${objUrl}" alt="${escapeHtml(filename)}">`;
            } else if (ext === 'pdf') {
                const blob = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error(r.status); return r.blob(); });
                const objUrl = URL.createObjectURL(blob);
                inner.innerHTML = `<iframe src="${objUrl}"></iframe>`;
            } else if (['mp4','webm','ogg'].includes(ext)) {
                const blob = await fetch(fileUrl).then(r => r.blob());
                const objUrl = URL.createObjectURL(blob);
                inner.innerHTML = `<video controls style="max-width:100%;"><source src="${objUrl}"></video>`;
            } else if (ext === 'docx') {
                const buf = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error('Fetch failed'); return r.arrayBuffer(); });
                const result = await mammoth.convertToHtml({ arrayBuffer: buf });
                inner.innerHTML = `<div style="font-family:Georgia,serif;line-height:1.7;max-width:720px;margin:0 auto;">${result.value}</div>`;
            } else if (['xlsx','xls'].includes(ext)) {
                const buf = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error('Fetch failed'); return r.arrayBuffer(); });
                const wb = XLSX.read(buf, { type: 'array' });
                let html = '';
                wb.SheetNames.forEach(name => {
                    const ws = wb.Sheets[name];
                    html += `<h4 style="margin:12px 0 6px;">${escapeHtml(name)}</h4>` + XLSX.utils.sheet_to_html(ws, { editable: false });
                });
                inner.innerHTML = `<div style="overflow:auto;">${html}</div>`;
            } else if (ext === 'pptx') {
                const buf = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error('Fetch failed'); return r.arrayBuffer(); });
                const zip = await JSZip.loadAsync(buf);
                const slideFiles = Object.keys(zip.files).filter(f => /^ppt\/slides\/slide\d+\.xml$/.test(f)).sort((a,b) => {
                    return parseInt(a.match(/slide(\d+)/)[1]) - parseInt(b.match(/slide(\d+)/)[1]);
                });
                if (!slideFiles.length) { inner.innerHTML = '<p>No slides found in this presentation.</p>'; return; }
                let html = '';
                for (const sf of slideFiles) {
                    const xmlStr = await zip.files[sf].async('string');
                    const doc = new DOMParser().parseFromString(xmlStr, 'text/xml');
                    const texts = Array.from(doc.querySelectorAll('a\\:t, t')).map(n => n.textContent).filter(t => t.trim());
                    const num = sf.match(/slide(\d+)/)[1];
                    html += `<div class="pptx-slide"><h4>Slide ${num}</h4><p>${texts.join(' ') || '<em>No text content</em>'}</p></div>`;
                }
                inner.innerHTML = html;
            } else {
                const text = await fetch(fileUrl).then(r => { if(!r.ok) throw new Error('Fetch failed'); return r.text(); });
                inner.innerHTML = `<pre>${escapeHtml(text)}</pre>`;
            }
        } catch (e) {
            inner.innerHTML = `<p style="color:#ef4444;text-align:center;padding:24px;">Preview failed: ${e.message}</p>`;
        }
    }

    loadShareInfo();
</script>
</body>
</html>
