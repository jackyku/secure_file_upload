# Web Upload Server — Nginx reverse proxy template
# The install.sh script configures this automatically.
#
# To apply manually, replace YOUR_DOMAIN_OR_IP, then:
#   sudo cp nginx-fileupload.conf /etc/nginx/sites-available/web-upload
#   sudo ln -sf /etc/nginx/sites-available/web-upload /etc/nginx/sites-enabled/web-upload
#   sudo nginx -t && sudo systemctl reload nginx
#
# For free HTTPS (real domain only):
#   sudo apt-get install -y certbot python3-certbot-nginx
#   sudo certbot --nginx -d YOUR_DOMAIN

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Allow uploads up to 1 TB
    client_max_body_size 0;

    # Large upload timeouts
    proxy_read_timeout  3600;
    proxy_send_timeout  3600;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
